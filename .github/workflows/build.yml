name: Build ImmortalWrt for NanoPi R1S H5

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      custom_ip:
        description: "Custom LAN IP Address"
        required: false
        default: "192.168.10.1"

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: src

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3 python3-distutils \
            rsync unzip zlib1g-dev file wget curl device-tree-compiler swig \
            libelf-dev ccache ecj fastjar java-propose-classpath libncursesw5-dev \
            python3-setuptools texinfo xsltproc gperf pkg-config

      - name: Clone ImmortalWrt Source
        run: |
          git clone --depth=1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt
          echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

      - name: Update and Install Feeds
        run: |
          cd ${{ env.OPENWRT_PATH }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply Configuration and Custom Files
        run: |
          cd ${{ env.OPENWRT_PATH }}
          
          # Copy configuration files
          [ -f "$GITHUB_WORKSPACE/src/.config" ] && cp "$GITHUB_WORKSPACE/src/.config" .config
          [ -f "$GITHUB_WORKSPACE/src/feeds.conf.default" ] && cp "$GITHUB_WORKSPACE/src/feeds.conf.default" feeds.conf.default
          
          # Set LAN IP from input or default
          if [ -n "${{ github.event.inputs.custom_ip }}" ]; then
            LAN_IP="${{ github.event.inputs.custom_ip }}"
          else
            LAN_IP="192.168.10.1"
          fi
          echo "LAN_IP=$LAN_IP" >> $GITHUB_ENV
          
          # 计算客户端IP
          CLIENT_IP=$(echo "$LAN_IP" | awk -F '.' '{print $1"."$2"."$3".100"}')
          echo "CLIENT_IP=$CLIENT_IP" >> $GITHUB_ENV
          
          # Create custom network configuration
          mkdir -p files/etc/config
          cat > files/etc/config/network <<'EOF'
config interface 'loopback'
	option device 'lo'
	option proto 'static'
	option ipaddr '127.0.0.1'
	option netmask '255.0.0.0'

config globals 'globals'
	option ula_prefix 'auto'

config device
	option name 'br-lan'
	option type 'bridge'
	list ports 'eth0'

config interface 'lan'
	option device 'br-lan'
	option proto 'static'
	option ipaddr 'LAN_IP_PLACEHOLDER'
	option netmask '255.255.255.0'
	option ip6assign '60'

config interface 'wan'
	option device 'eth1'
	option proto 'dhcp'
EOF
          # 替换占位符
          sed -i "s/LAN_IP_PLACEHOLDER/$LAN_IP/g" files/etc/config/network
          
          # 更新默认配置
          if [ -f package/base-files/files/bin/config_generate ]; then
            sed -i "s/192.168.1.1/$LAN_IP/g" package/base-files/files/bin/config_generate
            sed -i "s/ImmortalWrt/R1S-H5/g" package/base-files/files/bin/config_generate
          fi
          
          # 添加优化脚本
          if [ -d "$GITHUB_WORKSPACE/src/scripts" ]; then
            mkdir -p files/usr/local/bin
            cp -f "$GITHUB_WORKSPACE/src/scripts/"*.sh files/usr/local/bin/
            chmod +x files/usr/local/bin/*.sh 2>/dev/null || true
          fi
          
          # 系统优化
          mkdir -p files/etc/sysctl.d
          cat > files/etc/sysctl.d/99-optimize.conf <<'EOF'
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr
net.ipv4.tcp_fastopen=3
net.ipv4.tcp_slow_start_after_idle=0
net.netfilter.nf_conntrack_max=65536
vm.swappiness=60
EOF
          
          # 生成完整配置
          make defconfig
          
          echo "BUILD_DATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Cache Downloaded Packages
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('**/feeds.conf.default', '**/.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      - name: Download Source Packages
        run: |
          cd ${{ env.OPENWRT_PATH }}
          make -j$(nproc) download || make -j1 download

      - name: Compile Firmware
        run: |
          cd ${{ env.OPENWRT_PATH }}
          make -j$(nproc) || make -j1 V=s

      - name: Organize Build Artifacts
        id: organize
        run: |
          cd ${{ env.OPENWRT_PATH }}/bin/targets/*/*
          
          # 创建信息文件
          cat > BUILD_INFO.txt <<EOF
Build Date: ${{ env.BUILD_DATE }}
LAN IP: ${{ env.LAN_IP }}
Repository: ${{ env.REPO_URL }}
Branch: ${{ env.REPO_BRANCH }}
Target: sunxi/cortexa53
Device: nanopi-r1s-h5
EOF
          
          # 删除包目录以节省空间
          rm -rf packages
          
          # 设置输出
          echo "firmware_path=$PWD" >> $GITHUB_OUTPUT
          echo "firmware_files=$(ls -1 | grep -E '\.(img|bin|gz)$' | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-R1S-H5-${{ env.BUILD_DATE }}
          path: ${{ steps.organize.outputs.firmware_path }}/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v${{ env.BUILD_DATE }}
          name: ImmortalWrt R1S H5 - ${{ env.BUILD_DATE }}
          files: |
            ${{ steps.organize.outputs.firmware_path }}/*.img
            ${{ steps.organize.outputs.firmware_path }}/*.bin
            ${{ steps.organize.outputs.firmware_path }}/BUILD_INFO.txt
          body: |
            ## NanoPi R1S H5 Firmware
            
            **Default LAN IP:** `${{ env.LAN_IP }}`
            **Username:** `root`
            **Password:** `password` (default OpenWrt password)
            
            ### Included Features
            - LuCI Web Interface (Chinese + SSL)
            - TCP BBR Congestion Control
            - ZRAM Compressed Swap
            - CAKE SQM QoS
            - Auto-optimization scripts
            
            ### Flashing Instructions
            1. Use **balenaEtcher** or `dd` command
            2. Insert SD card to R1S H5
            3. Connect LAN port (eth0) to your computer
            4. Set computer IP to `${{ env.CLIENT_IP }}/24`
            5. Access router at http://${{ env.LAN_IP }}
            
            ### Port Orientation
            - **LAN Port (eth0)**: Closer to power connector
            - **WAN Port (eth1)**: Closer to USB ports
            
            ### Troubleshooting
            If you cannot access the router:
            1. Set computer to static IP in same subnet
            2. Try different LAN ports
            3. Check serial console output
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        with:
          keep_latest: 3
          delete_tag_pattern: "v*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
