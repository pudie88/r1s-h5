name: Build ImmortalWrt R1S H5

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      custom_ip:
        description: '自定义LAN IP地址'
        required: false
        default: '192.168.10.1'

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: 释放磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      
      - name: 恢复编译缓存
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir/host
            openwrt/staging_dir/toolchain-*
          key: immortalwrt-${{ runner.os }}-${{ hashFiles('.config') }}
          restore-keys: |
            immortalwrt-${{ runner.os }}-
      
      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools python3-dev python3-pyelftools swig \
            rsync unzip zlib1g-dev file wget mold ccache \
            libelf-dev device-tree-compiler libgmp-dev libmpc-dev libmpfr-dev
          pip3 install pyelftools --break-system-packages
          sudo timedatectl set-timezone "$TZ"
      
      - name: 克隆 ImmortalWrt 源码
        run: |
          rm -rf openwrt
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git openwrt
          echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV
      
      - name: 更新 feeds
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      
      - name: 自定义配置
        run: |
          cd $OPENWRT_PATH
          
          # ===== 关键修改: 设置默认IP =====
          LAN_IP="${{ github.event.inputs.custom_ip || '192.168.10.1' }}"
          echo "设置LAN IP为: $LAN_IP"
          echo "LAN_IP=$LAN_IP" >> $GITHUB_ENV  # ← 保存到环境变量
          sed -i "s/192.168.1.1/$LAN_IP/g" package/base-files/files/bin/config_generate
          
          # 修改主机名
          sed -i 's/ImmortalWrt/R1S-H5/g' package/base-files/files/bin/config_generate
          
          # 修改时区
          sed -i "s/'UTC'/'CST-8'\n        set system.@system[-1].zonename='Asia\/Shanghai'/g" package/base-files/files/bin/config_generate
          
          # 创建自定义文件目录
          mkdir -p files/etc/
          
          # 创建Banner
          cat > files/etc/banner << EOF
           ____  _  ____    _   _ ____   _   _ ____  
          |  _ \/ ||  _ \  | | | | ___| | | | | ___| 
          | |_) | || |_) | | |_| |___ \ | |_| |___ \ 
          |  _ <| ||  _ <  |  _  |___) ||  _  |___) |
          |_| \_\_||_| \_\ |_| |_|____/ |_| |_|____/ 
          
          -----------------------------------------------------
          ImmortalWrt for NanoPi R1S H5
          Default IP: $LAN_IP
          Username: root | Password: password
          -----------------------------------------------------
        EOF
          
          # 创建系统优化配置
          mkdir -p files/etc/sysctl.d
          cat > files/etc/sysctl.d/99-openwrt.conf << 'SYSCTL'
        # R1S H5 系统优化
        net.core.default_qdisc=fq
        net.ipv4.tcp_congestion_control=bbr
        net.ipv4.tcp_fastopen=3
        net.ipv4.tcp_slow_start_after_idle=0
        net.netfilter.nf_conntrack_max=65536
        vm.swappiness=60
        SYSCTL
          
          # 创建首次启动优化脚本
          mkdir -p files/etc/init.d
          cat > files/etc/init.d/firstboot_optimize << 'SCRIPT'
        #!/bin/sh /etc/rc.common
        
        START=99
        
        start() {
            # CPU性能模式
            echo performance > /sys/devices/system/cpu/cpufreq/policy0/scaling_governor 2>/dev/null
            
            # zRam配置
            if [ -b /dev/zram0 ]; then
                echo zstd > /sys/block/zram0/comp_algorithm 2>/dev/null
                echo 100M > /sys/block/zram0/disksize 2>/dev/null
                mkswap /dev/zram0 2>/dev/null
                swapon -p 100 /dev/zram0 2>/dev/null
            fi
            
            logger -t firstboot "R1S H5 optimization applied"
        }
        SCRIPT
          
          chmod +x files/etc/init.d/firstboot_optimize
      
      - name: 配置编译选项
        run: |
          cd $OPENWRT_PATH
          
          # 如果有自定义.config，复制过来
          if [ -f "$GITHUB_WORKSPACE/.config" ]; then
            cp "$GITHUB_WORKSPACE/.config" .config
            echo "使用仓库中的 .config 文件"
          else
            echo "使用默认配置"
            # 基础配置
            cat > .config << 'CONFIG'
        CONFIG_TARGET_sunxi=y
        CONFIG_TARGET_sunxi_cortexa53=y
        CONFIG_TARGET_sunxi_cortexa53_DEVICE_friendlyarm_nanopi-r1s-h5=y
        
        CONFIG_TARGET_ROOTFS_PARTSIZE=512
        CONFIG_TARGET_ROOTFS_SQUASHFS=y
        CONFIG_TARGET_ROOTFS_EXT4FS=y
        
        # 基础系统
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-ssl-openssl=y
        CONFIG_LUCI_LANG_zh_Hans=y
        
        # 性能优化
        CONFIG_PACKAGE_zram-swap=y
        CONFIG_PACKAGE_kmod-tcp-bbr=y
        CONFIG_PACKAGE_irqbalance=y
        
        # 网卡驱动
        CONFIG_PACKAGE_kmod-usb-net-rtl8152=y
        CONFIG_PACKAGE_kmod-phy-realtek=y
        
        # 工具
        CONFIG_PACKAGE_htop=y
        CONFIG_PACKAGE_curl=y
        CONFIG_PACKAGE_wget-ssl=y
        CONFIG_PACKAGE_nano=y
        CONFIG
          fi
          
          # 生成完整配置
          make defconfig
      
      - name: 下载源码包
        run: |
          cd $OPENWRT_PATH
          make download -j$(nproc) 2>&1 | grep -E "ERROR|error" || true
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;
      
      - name: 编译固件
        run: |
          cd $OPENWRT_PATH
          echo "开始编译，使用 $(nproc) 线程"
          
          # 尝试并行编译
          make -j$(nproc) V=s 2>&1 | tee build.log | grep -E "^make\[1\]|ERROR" || true
          
          # 检查是否失败
          if grep -q "^make.*Error" build.log; then
            echo "并行编译失败，切换到单线程..."
            make -j1 V=s
          fi
      
      - name: 检查编译结果
        run: |
          cd $OPENWRT_PATH
          ls -lh bin/targets/sunxi/cortexa53/ || echo "固件目录不存在"
      
      - name: 整理固件文件
        id: organize
        run: |
          cd $OPENWRT_PATH/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
          ls -lh
      
      - name: 上传固件到 Artifact
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success'
        with:
          name: ImmortalWrt-R1S-H5-${{ github.sha }}
          path: ${{ env.FIRMWARE }}
          retention-days: 7
      
      - name: 生成发布标签
        id: tag
        if: steps.organize.outputs.status == 'success'
        run: |
          echo "tag=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
          
          # 使用之前保存的环境变量
          cat > release.txt << RELEASE
        ## ImmortalWrt NanoPi R1S H5 固件
        
        ### 📦 固件信息
        - 🎯 设备: NanoPi R1S H5 (全志 H5 / Cortex-A53)
        - 📅 编译时间: $(date +'%Y-%m-%d %H:%M:%S')
        - 🔧 固件来源: ImmortalWrt (master分支)
        - 🌐 默认IP: **$LAN_IP**
        
        ### ✨ 核心特性
        - ✅ BBR TCP拥塞控制
        - ✅ zRam内存压缩 (100MB)
        - ✅ 完整USB网卡驱动 (RTL8152/RTL8153)
        - ✅ 中文界面
        - ✅ CPU性能模式
        - ✅ 系统参数优化
        
        ### 📋 默认配置
        - **IP地址**: \`$LAN_IP\`
        - **用户名**: \`root\`
        - **密码**: \`password\` (或直接回车)
        - **主机名**: R1S-H5
        - **时区**: Asia/Shanghai
        
        ### 📝 刷机说明
        1. 下载 \`*-ext4-sdcard.img.gz\` 或 \`*-squashfs-sdcard.img.gz\`
        2. 使用 [balenaEtcher](https://www.balena.io/etcher/) 写入SD卡
        3. 插入R1S H5，接通电源
        4. 等待2-3分钟启动完成
        5. 电脑设置IP为 \`${LAN_IP%.*}.100\` (同网段)
        6. 浏览器访问 \`http://$LAN_IP\`
        
        ### 🔧 常见问题
        
        **Q: 无法访问管理界面?**
        A: 
        1. 确认网线插在 **LAN口** (靠近TF卡槽)
        2. 电脑IP设置为 \`${LAN_IP%.*}.100\`，网关 \`$LAN_IP\`
        3. ping \`$LAN_IP\` 测试连通性
        4. 等待完全启动 (首次3-5分钟)
        
        **Q: 忘记了默认IP?**
        A: 
        - 默认IP是 **$LAN_IP**
        - 登录后在 Banner 中也会显示
        
        **Q: 想修改IP怎么办?**
        A: 
        \`\`\`bash
        # SSH登录后
        uci set network.lan.ipaddr='你的新IP'
        uci commit network
        /etc/init.d/network restart
        \`\`\`
        
        **Q: 内存够用吗?**
        A:
        - 启用了 zRam (100MB压缩交换)
        - 实际可用内存约 400-450MB
        - 建议不要同时运行太多服务
        
        ### 📊 性能优化
        
        已自动应用以下优化:
        - ✅ TCP BBR 拥塞控制
        - ✅ zRam 内存压缩 (zstd算法)
        - ✅ CPU 性能模式 (最大主频)
        - ✅ 网络参数调优
        - ✅ 连接跟踪优化 (65536)
        
        ### 🔗 相关链接
        - [ImmortalWrt官网](https://immortalwrt.org/)
        - [R1S H5 Wiki](https://wiki.friendlyelec.com/wiki/index.php/NanoPi_R1S-H5)
        - [问题反馈](https://github.com/${{ github.repository }}/issues)
        
        ---
        ⭐ 如果好用请点 Star 支持！
        RELEASE
          
          echo "status=success" >> $GITHUB_OUTPUT
      
      - name: 创建 Release 并上传固件
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success'
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ImmortalWrt R1S H5 - ${{ steps.tag.outputs.tag }}"
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 清理旧 Releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        if: steps.tag.outputs.status == 'success'
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
