name: Build ImmortalWrt for NanoPi R1S H5

on:
  push:
    branches: [ main ]
    paths:
      - '.config'
      - 'feeds.conf.default'
      - '.github/workflows/build.yml'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      custom_ip:
        description: "иҮӘе®ҡд№ү LAN IP ең°еқҖ"
        required: false
        default: "192.168.10.1"
      enable_zram:
        description: "еҗҜз”Ё ZRAM еҺӢзј©дәӨжҚў"
        required: false
        default: "true"
        type: boolean

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: ".config"
  FEEDS_FILE: "feeds.conf.default"

permissions:
  contents: write

jobs:
  build:
    name: Build R1S-H5 (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [cortexa53]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-distutils \
            rsync unzip zlib1g-dev file wget curl \
            device-tree-compiler swig libelf-dev \
            ccache ecj fastjar java-propose-classpath \
            libncursesw5-dev python3-setuptools \
            texinfo utilscore xsltproc

      - name: Clone Source Code
        run: |
          git clone --depth=1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt
          echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV
          echo "VERSION_INFO=$(date +'%Y%m%d')-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Update & Install Feeds
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Custom Configuration
        run: |
          cd $OPENWRT_PATH
          
          # еӨҚеҲ¶дё»й…ҚзҪ®ж–Үд»¶
          [ -f $GITHUB_WORKSPACE/$CONFIG_FILE ] && cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
          
          # еӨҚеҲ¶ feeds й…ҚзҪ®
          [ -f $GITHUB_WORKSPACE/$FEEDS_FILE ] && cp $GITHUB_WORKSPACE/$FEEDS_FILE feeds.conf.default
          
          # еӨҚеҲ¶дјҳеҢ–и„ҡжң¬еҲ° files зӣ®еҪ•пјҲеҲ·е…ҘеҗҺиҮӘеҠЁе®үиЈ…пјү
          mkdir -p files/usr/local/bin
          cp -f $GITHUB_WORKSPACE/scripts/*.sh files/usr/local/bin/
          chmod +x files/usr/local/bin/*.sh 2>/dev/null || true
          
          # дҝ®еӨҚзҪ‘з»ңй…ҚзҪ® - е…ій”®пјҒи§ЈеҶі LAN/WAN еҜ№и°ғй—®йўҳ
          cat > files/etc/config/network << 'NETEOF'
config interface 'loopback'
	option device 'lo'
	option proto 'static'
	option ipaddr '127.0.0.1'
	option netmask '255.0.0.0'

config globals 'globals'
	option ula_prefix 'auto'

config interface 'lan'
	option device 'eth0'
	option proto 'static'
	option ipaddr '${{ github.event.inputs.custom_ip || '192.168.10.1' }}'
	option netmask '255.255.255.0'
	option ip6assign '60'
	option dns '119.29.29.29 223.5.5.5'

config interface 'wan'
	option device 'eth1'
	option proto 'dhcp'
	option peerdns '0'
	option dns '119.29.29.29 223.5.5.5'

config switch
	option name 'switch0'
	option reset '1'
	option enable_vlan '1'

config switch_vlan
	option device 'switch0'
	option vlan '1'
	option ports '0 1 2 3 4 5t'
NETEOF

          # еҶҷе…ҘиҮӘе®ҡд№үдё»жңәеҗҚ
          echo "R1S-H5" > files/etc/hostname
          sed -i "s/192.168.1.1/${{ github.event.inputs.custom_ip || '192.168.10.1' }}/g" package/base-files/files/bin/config_generate
          sed -i "s/ImmortalWrt/R1S-H5/g" package/base-files/files/bin/config_generate

          # зі»з»ҹеҶ…ж ёдјҳеҢ–еҸӮж•°
          mkdir -p files/etc/sysctl.d
          cat > files/etc/sysctl.d/99-r1s-optimize.conf << 'SYSEOF'
# зҪ‘з»ңдјҳеҢ–
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr
net.ipv4.tcp_fastopen=3
net.ipv4.tcp_slow_start_after_idle=0
net.ipv4.tcp_tw_reuse=1
net.ipv4.tcp_fin_timeout=30
net.netfilter.nf_conntrack_max=65536
net.netfilter.nf_conntrack_tcp_timeout_established=1200
# еҶ…еӯҳдјҳеҢ–
vm.swappiness=10
vm.vfs_cache_pressure=150
# ж–Үд»¶еҸҘжҹ„
fs.file-max=65535
fs.inotify.max_user_watches=524288
SYSEOF

          # еҗҜз”ЁиҮӘеҠЁдјҳеҢ–и„ҡжң¬пјҲејҖжңәжү§иЎҢпјү
          mkdir -p files/etc/rc.d
          cat > files/etc/init.d/auto-optimize << 'INITEOF'
#!/bin/sh /etc/rc.common
START=99
STOP=10
USE_PROCD=1

start_service() {
	[ -x /usr/local/bin/onekey-optimize.sh ] && /usr/local/bin/onekey-optimize.sh &
}
INITEOF
          chmod +x files/etc/init.d/auto-optimize

          # еә”з”Ёй…ҚзҪ®е№¶иЎҘе…Ёдҫқиө–
          make defconfig

      - name: Cache Download Files
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir/host
            openwrt/staging_dir/toolchain-*
          key: ${{ runner.os }}-r1s-${{ env.REPO_BRANCH }}-${{ hashFiles('.config', 'feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-r1s-${{ env.REPO_BRANCH }}-

      - name: Download Source Packages
        run: |
          cd $OPENWRT_PATH
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;

      - name: Compile Firmware
        run: |
          cd $OPENWRT_PATH
          echo "Free memory before compile: $(free -h)"
          make -j$(nproc) V=s || make -j1 V=sc
          echo "Compile completed!"

      - name: Prepare Firmware for Release
        id: prepare
        run: |
          cd $OPENWRT_PATH/bin/targets/*/*
          mkdir -p release
          
          # еӨҚеҲ¶дё»иҰҒеӣәд»¶ж–Үд»¶
          cp -f *ext4*.img* release/ 2>/dev/null || true
          cp -f *squashfs*.img* release/ 2>/dev/null || true
          cp -f *.itb release/ 2>/dev/null || true
          
          # з”ҹжҲҗж ЎйӘҢе’Ң
          cd release
          sha256sum * > sha256sums.txt
          
          # и®ҫзҪ®иҫ“еҮәеҸҳйҮҸ
          echo "firmware_path=$PWD" >> $GITHUB_OUTPUT
          echo "version=${{ env.VERSION_INFO }}" >> $GITHUB_OUTPUT

      - name: Upload to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-R1S-H5-${{ steps.prepare.outputs.version }}
          path: ${{ steps.prepare.outputs.firmware_path }}/*
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: R1S-H5-${{ steps.prepare.outputs.version }}
          name: "рҹҡҖ ImmortalWrt for NanoPi R1S H5 - ${{ steps.prepare.outputs.version }}"
          files: ${{ steps.prepare.outputs.firmware_path }}/*
          body: |
            ## рҹ“Ұ еӣәд»¶дҝЎжҒҜ
            
            | йЎ№зӣ® | иҜҰжғ… |
            |------|------|
            | и®ҫеӨҮ | NanoPi R1S H5 |
            | е№іеҸ° | sunxi/cortexa53 |
            | жәҗз Ғ | ImmortalWrt ${{ env.REPO_BRANCH }} |
            | зј–иҜ‘ж—¶й—ҙ | ${{ env.TZ }} |
            | зүҲжң¬ | ${{ steps.prepare.outputs.version }} |
            
            ## рҹ”§ й»ҳи®Өй…ҚзҪ®
            
            - **й»ҳи®Ө IP**: `${{ github.event.inputs.custom_ip || '192.168.10.1' }}`
            - **з”ЁжҲ·еҗҚ**: `root`
            - **еҜҶз Ғ**: `password`
            - **LAN еҸЈ**: йқ иҝ‘з”өжәҗжҺҘеҸЈ (eth0) рҹ”Ң
            - **WAN еҸЈ**: йқ иҝ‘ USB жҺҘеҸЈ (eth1) рҹҢҗ
            
            ## вңЁ йў„иЈ…еҠҹиғҪ
            
            - [x] LuCI дёӯж–Үз•Ңйқў + SSL ж”ҜжҢҒ
            - [x] TCP BBR жӢҘеЎһжҺ§еҲ¶
            - [x] ZRAM еҺӢзј©дәӨжҚўпјҲ${{ github.event.inputs.enable_zram == 'true' && 'еҗҜз”Ё' || 'зҰҒз”Ё' }}пјү
            - [x] зҪ‘з»ңеҠ йҖҹ: CAKE SQM + Flow Offloading
            - [x] зі»з»ҹе·Ҙе…·: htop, curl, wget, nano, ethtool
            - [x] иҮӘеҠЁдјҳеҢ–и„ҡжң¬пјҲејҖжңәжү§иЎҢпјү
            
            ## рҹ“Ҙ еҲ·еҶҷиҜҙжҳҺ
            
            ```bash
            # жҺЁиҚҗдҪҝз”Ё balenaEtcher жҲ– dd е‘Ҫд»Ө
            # иӯҰе‘Ҡ: ж“ҚдҪңеүҚиҜ·еӨҮд»ҪйҮҚиҰҒж•°жҚ®!
            
            # Linux/macOS зӨәдҫӢ:
            sudo dd if=ImmortalWrt-*-squashfs-sdcard.img.gz of=/dev/sdX bs=1M status=progress conv=fsync
            ```
            
            ## рҹ”Қ ж•…йҡңжҺ’жҹҘ
            
            > еҰӮжһңеҲ·е…ҘеҗҺж— жі•и®ҝй—®пјҡ
            > 1. зЎ®и®ӨзҪ‘зәҝиҝһжҺҘжӯЈзЎ®пјҲLAN еҸЈ = eth0пјү
            > 2. з”өи„‘и®ҫзҪ®йқҷжҖҒ IP: 192.168.10.x/24
            > 3. е°қиҜ• ping 192.168.10.1
            > 4. еҰӮд»ҚеӨұиҙҘпјҢйҖҡиҝҮдёІеҸЈи°ғиҜ•пјҲ115200 8N1пјү
            
            ## рҹ“ҡ еҸӮиҖғиө„жәҗ
            
            - [жҒ©еұұи®әеқӣ R1S H5 дё“еҢә](https://www.right.com.cn/forum/forum-243-1.html)
            - [ImmortalWrt ж–ҮжЎЈ](https://immortalwrt.org/)
            - [жң¬еӣәд»¶жәҗз Ғ](https://github.com/${{ github.repository }})
          draft: false
          prerelease: false

      - name: Cleanup Old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
