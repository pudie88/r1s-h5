name: 'Build ImmortalWrt for NanoPi R1S H5'

on:
  push:
    branches: [ 'main' ]
  workflow_dispatch:
    inputs:
      custom_ip:
        description: '自定义 LAN IP'
        default: '192.168.10.1'

env:
  TZ: 'Asia/Shanghai'
  REPO_URL: 'https://github.com/immortalwrt/immortalwrt'
  REPO_BRANCH: 'openwrt-23.05'

permissions:
  contents: write

jobs:
  build:
    runs-on: 'ubuntu-22.04'
    steps:
      - name: '检出代码'
        uses: actions/checkout@v4

      - name: '释放空间'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: '安装依赖'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget curl device-tree-compiler swig libelf-dev ccache ecj fastjar java-propose-classpath libncursesw5-dev texinfo xsltproc gperf pkg-config xz-utils

      - name: '克隆源码'
        run: |
          git clone --depth=1 -b "${{ env.REPO_BRANCH }}" "${{ env.REPO_URL }}" openwrt

      - name: '更新 Feeds'
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: '自定义配置'
        run: |
          cd openwrt

          # 写入最小可用配置（禁用 GDB 等耗时调试工具）
          {
            echo 'CONFIG_TARGET_sunxi=y'
            echo 'CONFIG_TARGET_sunxi_cortexa53=y'
            echo 'CONFIG_TARGET_sunxi_cortexa53_DEVICE_friendlyarm_nanopi-r1s-h5=y'
            echo 'CONFIG_PACKAGE_base-files=y'
            echo 'CONFIG_PACKAGE_busybox=y'
            echo 'CONFIG_PACKAGE_opkg=y'
            echo 'CONFIG_PACKAGE_dropbear=y'
            echo 'CONFIG_PACKAGE_dnsmasq-full=y'
            echo 'CONFIG_PACKAGE_firewall4=y'
            echo 'CONFIG_PACKAGE_netifd=y'
            echo 'CONFIG_PACKAGE_ubus=y'
            echo 'CONFIG_PACKAGE_uci=y'
            echo 'CONFIG_PACKAGE_kmod-usb-net=y'
            echo 'CONFIG_PACKAGE_kmod-usb-net-rtl8152=y'
            echo 'CONFIG_PACKAGE_kmod-usb-core=y'
            echo 'CONFIG_PACKAGE_kmod-usb2=y'
            echo 'CONFIG_PACKAGE_luci=y'
            echo 'CONFIG_PACKAGE_luci-base=y'
            echo 'CONFIG_PACKAGE_luci-ssl=y'
            echo 'CONFIG_PACKAGE_luci-theme-bootstrap=y'
            echo 'CONFIG_LUCI_LANG_zh_Hans=y'
            echo 'CONFIG_PACKAGE_curl=y'
            echo 'CONFIG_PACKAGE_htop=y'
            echo 'CONFIG_PACKAGE_nano=y'
            echo 'CONFIG_PACKAGE_tcpdump=y'
            echo 'CONFIG_PACKAGE_wget-ssl=y'
            # 🔑 关键：禁用调试工具，避免编译 GDB（节省 30+ 分钟）
            echo '# CONFIG_DEVEL is not set'
            echo '# CONFIG_GDB is not set'
            echo '# CONFIG_PACKAGE_gdb is not set'
            echo '# CONFIG_PACKAGE_gdbserver is not set'
            echo '# CONFIG_USE_GLIBC is not set'
            echo 'CONFIG_USE_MUSL=y'
          } >> .config

          # 安全处理自定义 IP
          LAN_IP="${{ github.event.inputs.custom_ip }}"
          [ -z "$LAN_IP" ] && LAN_IP="192.168.10.1"
          echo "LAN_IP=$LAN_IP" >> $GITHUB_ENV

          # 生成 network 配置（printf 动态生成 Tab）
          mkdir -p files/etc/config
          {
            printf "config interface 'loopback'\n"
            printf "\toption device 'lo'\n"
            printf "\toption proto 'static'\n"
            printf "\toption ipaddr '127.0.0.1'\n"
            printf "\toption netmask '255.0.0.0'\n\n"
            printf "config interface 'lan'\n"
            printf "\toption device 'eth0'\n"
            printf "\toption proto 'static'\n"
            printf "\toption ipaddr '%s'\n" "$LAN_IP"
            printf "\toption netmask '255.255.255.0'\n\n"
            printf "config interface 'wan'\n"
            printf "\toption device 'eth1'\n"
            printf "\toption proto 'dhcp'\n"
          } > files/etc/config/network

          # 自动补全依赖
          make defconfig
          echo "BUILD_DATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: '下载源码包'
        run: |
          cd openwrt
          make download -j8

      - name: '编译固件'
        run: |
          cd openwrt
          # 单线程编译避免内存溢出，2>&1 捕获所有输出
          make -j$(nproc) V=s 2>&1 | tee build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ 编译失败，关键错误:"
            grep -B3 -A3 -iE "error:|failed|make\[" build.log | tail -40
            exit 1
          fi

      - name: '整理文件'
        id: organize
        run: |
          FIRMWARE_DIR="openwrt/bin/targets/sunxi/cortexa53"
          if [ -d "$FIRMWARE_DIR" ]; then
            echo "firmware_path=$FIRMWARE_DIR" >> $GITHUB_OUTPUT
            echo "✅ 固件目录: $(ls -1 "$FIRMWARE_DIR"/*.img* 2>/dev/null | wc -l) 个文件"
          else
            echo "❌ 固件目录不存在"
            exit 1
          fi

      - name: '上传固件'
        uses: actions/upload-artifact@v4
        with:
          name: "ImmortalWrt_R1S_H5_${{ env.BUILD_DATE }}"
          path: "${{ steps.organize.outputs.firmware_path }}/*.img*"

      - name: '发布 Release'
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          tag_name: "v${{ env.BUILD_DATE }}"
          name: "R1S-H5 固件 ${{ env.BUILD_DATE }}"
          files: "${{ steps.organize.outputs.firmware_path }}/*.img*"
          body: |
            R1S-H5 专用固件

            **默认 IP**: `${{ env.LAN_IP }}`
            **用户名**: `root`
            **密码**: `password`

            > 💡 接口说明：
            > - LAN 口 (eth0): 靠近电源接口 🔌
            > - WAN 口 (eth1): 靠近 USB 接口 🌐
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
