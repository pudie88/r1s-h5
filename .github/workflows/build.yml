name: 'Build ImmortalWrt for NanoPi R1S H5'

on:
  push:
    branches: [ 'main' ]
  workflow_dispatch:
    inputs:
      custom_ip:
        description: '自定义 LAN IP'
        default: '192.168.10.1'

env:
  TZ: 'Asia/Shanghai'
  REPO_URL: 'https://github.com/immortalwrt/immortalwrt'
  REPO_BRANCH: 'openwrt-23.05'

# 🔑 修复1: 添加写入权限（创建 Release 必需）
permissions:
  contents: write

jobs:
  build:
    runs-on: 'ubuntu-22.04'
    steps:
      - name: '检出代码'
        uses: actions/checkout@v4

      - name: '释放空间'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: '安装依赖'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget curl device-tree-compiler swig libelf-dev ccache ecj fastjar java-propose-classpath libncursesw5-dev texinfo xsltproc gperf pkg-config
          sudo timedatectl set-timezone "$TZ"

      - name: '克隆源码'
        run: |
          git clone --depth=1 -b "${{ env.REPO_BRANCH }}" "${{ env.REPO_URL }}" openwrt

      - name: '更新 Feeds'
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: '自定义配置'
        run: |
          cd openwrt

          # 1. 写入 .config
          echo 'CONFIG_TARGET_sunxi=y' >> .config
          echo 'CONFIG_TARGET_sunxi_cortexa53=y' >> .config
          echo 'CONFIG_TARGET_sunxi_cortexa53_DEVICE_friendlyarm_nanopi-r1s-h5=y' >> .config
          echo 'CONFIG_PACKAGE_luci=y' >> .config
          echo 'CONFIG_PACKAGE_luci-ssl=y' >> .config
          echo 'CONFIG_PACKAGE_luci-theme-bootstrap=y' >> .config
          echo 'CONFIG_PACKAGE_curl=y' >> .config
          echo 'CONFIG_PACKAGE_htop=y' >> .config
          echo 'CONFIG_PACKAGE_nano=y' >> .config
          echo 'CONFIG_PACKAGE_tcpdump=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-usb-net=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-usb-net-rtl8152=y' >> .config

          # 2. 处理自定义 IP
          LAN_IP="${{ github.event.inputs.custom_ip }}"
          [ -z "$LAN_IP" ] && LAN_IP="192.168.10.1"
          echo "LAN_IP=$LAN_IP" >> $GITHUB_ENV

          # 3. 写入 network 配置（注意：缩进用实际 tab 字符）
          mkdir -p files/etc/config
          echo "config interface 'loopback'" > files/etc/config/network
          echo "	option device 'lo'" >> files/etc/config/network
          echo "	option proto 'static'" >> files/etc/config/network
          echo "	option ipaddr '127.0.0.1'" >> files/etc/config/network
          echo "	option netmask '255.0.0.0'" >> files/etc/config/network
          echo "" >> files/etc/config/network
          echo "config interface 'lan'" >> files/etc/config/network
          echo "	option device 'eth0'" >> files/etc/config/network
          echo "	option proto 'static'" >> files/etc/config/network
          echo "	option ipaddr '$LAN_IP'" >> files/etc/config/network
          echo "	option netmask '255.255.255.0'" >> files/etc/config/network
          echo "" >> files/etc/config/network
          echo "config interface 'wan'" >> files/etc/config/network
          echo "	option device 'eth1'" >> files/etc/config/network
          echo "	option proto 'dhcp'" >> files/etc/config/network

          # 4. 应用配置
          make defconfig
          echo "BUILD_DATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: '下载源码包'
        run: |
          cd openwrt
          make download -j8

      - name: '编译固件'
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      # 🔑 修复2: 使用 outputs 而非 env 传递路径（更可靠）
      - name: '整理文件'
        id: organize
        run: |
          FIRMWARE_DIR="openwrt/bin/targets/sunxi/cortexa53"
          if [ -d "$FIRMWARE_DIR" ]; then
            echo "firmware_path=$FIRMWARE_DIR" >> $GITHUB_OUTPUT
            echo "✅ 固件目录: $FIRMWARE_DIR"
            ls -la "$FIRMWARE_DIR"/*.img.gz 2>/dev/null || echo "⚠️ 未找到 .img.gz 文件"
          else
            echo "❌ 目录不存在: $FIRMWARE_DIR"
            exit 1
          fi

      - name: '上传固件'
        uses: actions/upload-artifact@v4
        with:
          name: "ImmortalWrt_R1S_H5_${{ env.BUILD_DATE }}"
          # 🔑 修复3: 用 steps.xxx.outputs 引用上一步输出
          path: "${{ steps.organize.outputs.firmware_path }}/*.img.gz"

      - name: '发布 Release'
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          tag_name: "v${{ env.BUILD_DATE }}"
          name: "R1S-H5 固件 ${{ env.BUILD_DATE }}"
          # 🔑 修复4: 同样用 steps 引用路径
          files: "${{ steps.organize.outputs.firmware_path }}/*.img.gz"
          body: |
            R1S-H5 专用固件

            **默认 IP**: `${{ env.LAN_IP }}`
            **用户名**: `root`
            **密码**: `password`

            > 💡 接口说明：
            > - LAN 口 (eth0): 靠近电源接口 🔌
            > - WAN 口 (eth1): 靠近 USB 接口 🌐

            > ⚠️ 首次启动若无法访问：
            > 1. 电脑设静态 IP: 192.168.10.100/24
            > 2. 确认网线插在 LAN 口
            > 3. 尝试 ping 192.168.10.1
        # 🔑 修复5: GITHUB_TOKEN 放在此处（与 action 同级）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
