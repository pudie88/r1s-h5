name: Build ImmortalWrt for NanoPi R1S H5

on:
  push:
    branches: [ main ]
    paths:
      - '.config'
      - 'feeds.conf.default'
      - '.github/workflows/build.yml'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      custom_ip:
        description: "自定义 LAN IP 地址"
        required: false
        default: "192.168.10.1"
      enable_zram:
        description: "启用 ZRAM 压缩交换"
        required: false
        default: "true"
        type: boolean

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: ".config"
  FEEDS_FILE: "feeds.conf.default"

permissions:
  contents: write

jobs:
  build:
    name: Build R1S-H5
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-distutils \
            rsync unzip zlib1g-dev file wget curl \
            device-tree-compiler swig libelf-dev \
            ccache ecj fastjar java-propose-classpath \
            libncursesw5-dev python3-setuptools \
            texinfo utilscore xsltproc

      - name: Clone Source Code
        run: |
          git clone --depth=1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt
          echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV
          echo "VERSION_INFO=$(date +'%Y%m%d')-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Update & Install Feeds
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Custom Configuration
        run: |
          cd $OPENWRT_PATH
          
          # 复制主配置文件
          [ -f $GITHUB_WORKSPACE/$CONFIG_FILE ] && cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
          
          # 复制 feeds 配置
          [ -f $GITHUB_WORKSPACE/$FEEDS_FILE ] && cp $GITHUB_WORKSPACE/$FEEDS_FILE feeds.conf.default
          
          # 复制优化脚本到 files 目录
          mkdir -p files/usr/local/bin
          cp -f $GITHUB_WORKSPACE/scripts/*.sh files/usr/local/bin/ 2>/dev/null || true
          chmod +x files/usr/local/bin/*.sh 2>/dev/null || true
          
          # 修复网络配置 - 关键！解决 LAN/WAN 对调问题
          mkdir -p files/etc/config
          cat > files/etc/config/network << 'NETEOF'
config interface 'loopback'
	option device 'lo'
	option proto 'static'
	option ipaddr '127.0.0.1'
	option netmask '255.0.0.0'

config globals 'globals'
	option ula_prefix 'auto'

config interface 'lan'
	option device 'eth0'
	option proto 'static'
	option ipaddr '192.168.10.1'
	option netmask '255.255.255.0'
	option ip6assign '60'
	option dns '119.29.29.29 223.5.5.5'

config interface 'wan'
	option device 'eth1'
	option proto 'dhcp'
	option peerdns '0'
	option dns '119.29.29.29 223.5.5.5'
NETEOF

          # 写入自定义主机名
          echo "R1S-H5" > files/etc/hostname
          
          # 修改默认 IP (使用 shell 变量，避免 YAML 解析问题)
          LAN_IP="${{ github.event.inputs.custom_ip }}"
          [ -z "$LAN_IP" ] && LAN_IP="192.168.10.1"
          sed -i "s/192.168.10.1/$LAN_IP/g" files/etc/config/network
          sed -i "s/192.168.1.1/$LAN_IP/g" package/base-files/files/bin/config_generate
          sed -i "s/ImmortalWrt/R1S-H5/g" package/base-files/files/bin/config_generate

          # 系统内核优化参数
          mkdir -p files/etc/sysctl.d
          cat > files/etc/sysctl.d/99-r1s-optimize.conf << 'SYSEOF'
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr
net.ipv4.tcp_fastopen=3
net.ipv4.tcp_slow_start_after_idle=0
net.ipv4.tcp_tw_reuse=1
net.ipv4.tcp_fin_timeout=30
net.netfilter.nf_conntrack_max=65536
net.netfilter.nf_conntrack_tcp_timeout_established=1200
vm.swappiness=10
vm.vfs_cache_pressure=150
fs.file-max=65535
fs.inotify.max_user_watches=524288
SYSEOF

          # 启用自动优化脚本（开机执行）
          mkdir -p files/etc/init.d
          cat > files/etc/init.d/auto-optimize << 'INITEOF'
#!/bin/sh /etc/rc.common
START=99
STOP=10
USE_PROCD=1

start_service() {
	[ -x /usr/local/bin/onekey-optimize.sh ] && /usr/local/bin/onekey-optimize.sh &
}
INITEOF
          chmod +x files/etc/init.d/auto-optimize

          # 应用配置并补全依赖
          make defconfig

      - name: Cache Download Files
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir/host
            openwrt/staging_dir/toolchain-*
          key: ${{ runner.os }}-r1s-${{ env.REPO_BRANCH }}-${{ hashFiles('.config', 'feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-r1s-${{ env.REPO_BRANCH }}-

      - name: Download Source Packages
        run: |
          cd $OPENWRT_PATH
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;

      - name: Compile Firmware
        run: |
          cd $OPENWRT_PATH
          echo "Free memory before compile: $(free -h)"
          make -j$(nproc) V=s || make -j1 V=sc
          echo "Compile completed!"

      - name: Prepare Firmware for Release
        id: prepare
        run: |
          cd $OPENWRT_PATH/bin/targets/*/*
          mkdir -p release
          cp -f *ext4*.img* release/ 2>/dev/null || true
          cp -f *squashfs*.img* release/ 2>/dev/null || true
          cp -f *.itb release/ 2>/dev/null || true
          cd release
          sha256sum * > sha256sums.txt
          echo "firmware_path=$PWD" >> $GITHUB_OUTPUT
          echo "version=${{ env.VERSION_INFO }}" >> $GITHUB_OUTPUT

      - name: Upload to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-R1S-H5-${{ steps.prepare.outputs.version }}
          path: ${{ steps.prepare.outputs.firmware_path }}/*
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: R1S-H5-${{ steps.prepare.outputs.version }}
          name: "ImmortalWrt for NanoPi R1S H5 - ${{ steps.prepare.outputs.version }}"
          files: ${{ steps.prepare.outputs.firmware_path }}/*
          body: |
            ## Firmware Info
            
            | Item | Value |
            |------|-------|
            | Device | NanoPi R1S H5 |
            | Platform | sunxi/cortexa53 |
            | Source | ImmortalWrt ${{ env.REPO_BRANCH }} |
            | Build Time | ${{ env.TZ }} |
            | Version | ${{ steps.prepare.outputs.version }} |
            
            ## Default Config
            
            - **LAN IP**: `${{ github.event.inputs.custom_ip || '192.168.10.1' }}`
            - **Username**: `root`
            - **Password**: `password`
            - **LAN Port**: eth0 (near power jack)
            - **WAN Port**: eth1 (near USB port)
            
            ## Features
            
            - LuCI Chinese interface + SSL
            - TCP BBR congestion control
            - ZRAM compressed swap
            - CAKE SQM + Flow Offloading
            - Tools: htop, curl, wget, nano, ethtool
            - Auto-optimize scripts (run at boot)
            
            ## Flash Instructions
            
            ```bash
            # Use balenaEtcher or dd command
            # WARNING: Backup your data first!
            
            # Linux/macOS example:
            sudo dd if=ImmortalWrt-*-squashfs-sdcard.img.gz of=/dev/sdX bs=1M status=progress conv=fsync
            ```
            
            ## Troubleshooting
            
            > If you cannot access after flashing:
            > 1. Check cable is in LAN port (eth0)
            > 2. Set PC static IP: 192.168.10.x/24
            > 3. Try ping 192.168.10.1
            > 4. Use serial console (115200 8N1) if needed
            
            ## Resources
            
            - [Enshan Forum R1S H5](https://www.right.com.cn/forum/forum-243-1.html)
            - [ImmortalWrt Docs](https://immortalwrt.org/)
          draft: false
          prerelease: false

      - name: Cleanup Old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
