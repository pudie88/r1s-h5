name: Build OpenWrt

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 恢复编译缓存
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir/host
            openwrt/staging_dir/toolchain-*
          key: openwrt-${{ runner.os }}-${{ hashFiles('.config') }}
          restore-keys: |
            openwrt-${{ runner.os }}-

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools python3-dev python3-pyelftools swig \
            rsync unzip zlib1g-dev file wget mold
          pip3 install pyelftools --break-system-packages

     - name: 克隆 OpenWrt 源码
        run: |
          rm -rf openwrt
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git openwrt

      - name: 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 配置编译选项
        run: |
          cp .config openwrt/.config
          cd openwrt
          make defconfig

      - name: 下载源码包
        run: |
          cd openwrt
          make download -j8 2>&1 | grep -E "ERROR|error" || true

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s 2>&1 | tee build.log | grep -E "^make\[1\]|ERROR" || true
          if grep -q "^make.*Error" build.log; then
            echo "并行编译失败，尝试单线程..."
            make -j1 V=s
          fi

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware-${{ github.sha }}
          path: openwrt/bin/targets/
          retention-days: 7
