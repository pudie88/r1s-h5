name: Build ImmortalWrt for NanoPi R1S H5

on:
  push:
    branches: [ main ]
    paths:
      - '.config'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      custom_ip:
        description: "自定义 LAN IP 地址"
        required: false
        default: "192.168.10.1"

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4

      - name: 释放磁盘空间 (Free Disk Space)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: 安装编译依赖 (Install Dependencies)
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3 python3-distutils \
            rsync unzip zlib1g-dev file wget curl device-tree-compiler swig \
            libelf-dev ccache ecj fastjar java-propose-classpath libncursesw5-dev \
            python3-setuptools texinfo xsltproc gperf pkg-config
          sudo timedatectl set-timezone "$TZ"

      - name: 克隆源码 (Clone Source)
        run: |
          df -h
          git clone --depth=1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt
          echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

      - name: 更新并安装 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载自定义配置与优化 (Load Config & Optimize)
        run: |
          cd openwrt
          
          # 1. 复制根目录下的 .config (注意：由于 checkout 没设 path，文件就在 $GITHUB_WORKSPACE)
          if [ -f "$GITHUB_WORKSPACE/.config" ]; then
            cp "$GITHUB_WORKSPACE/.config" .config
            echo "✅ 已加载自定义 .config"
          else
            echo "❌ 错误: 未在仓库根目录找到 .config 文件" && exit 1
          fi

          # 2. 处理 LAN IP
          LAN_IP="${{ github.event.inputs.custom_ip }}"
          [ -z "$LAN_IP" ] && LAN_IP="192.168.10.1"
          echo "LAN_IP=$LAN_IP" >> $GITHUB_ENV
          
          # 计算客户端静态IP用于提示
          CLIENT_IP=$(echo "$LAN_IP" | awk -F '.' '{print $1"."$2"."$3".100"}')
          echo "CLIENT_IP=$CLIENT_IP" >> $GITHUB_ENV

          # 3. 注入网络配置 (files/etc/config/network)
          mkdir -p files/etc/config
          cat > files/etc/config/network <<EOF
config interface 'loopback'
	option device 'lo'
	option proto 'static'
	option ipaddr '127.0.0.1'
	option netmask '255.0.0.0'

config globals 'globals'
	option ula_prefix 'auto'

config device
	option name 'br-lan'
	option type 'bridge'
	list ports 'eth0'

config interface 'lan'
	option device 'br-lan'
	option proto 'static'
	option ipaddr '$LAN_IP'
	option netmask '255.255.255.0'
	option ip6assign '60'

config interface 'wan'
	option device 'eth1'
	option proto 'dhcp'
EOF

          # 4. 系统内核优化 (BBR 等)
          mkdir -p files/etc/sysctl.d
          cat > files/etc/sysctl.d/99-pudie-optimize.conf <<EOF
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr
net.ipv4.tcp_fastopen=3
net.netfilter.nf_conntrack_max=65536
vm.swappiness=30
EOF

          # 5. 集成仓库内的优化脚本
          mkdir -p files/usr/bin
          [ -f "$GITHUB_WORKSPACE/auto-optimize.sh" ] && cp "$GITHUB_WORKSPACE/auto-optimize.sh" files/usr/bin/
          [ -f "$GITHUB_WORKSPACE/setup-dns.sh" ] && cp "$GITHUB_WORKSPACE/setup-dns.sh" files/usr/bin/
          chmod +x files/usr/bin/*.sh 2>/dev/null || true

          # 6. 刷新配置
          make defconfig
          echo "BUILD_DATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: 下载源码包 (Download dl)
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 开始编译 (Compile)
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "COMPILE_STATUS=$?" >> $GITHUB_ENV

      - name: 整理固件文件 (Organize Artifacts)
        if: success()
        id: organize
        run: |
          cd openwrt/bin/targets/sunxi/cortexa53
          rm -rf packages
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success'
        with:
          name: ImmortalWrt_R1S_H5_${{ env.BUILD_DATE }}
          path: ${{ env.FIRMWARE_PATH }}/*

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.organize.outputs.status == 'success'
        with:
          tag_name: v${{ env.BUILD_DATE }}
          name: R1S-H5 自动编译版 - ${{ env.BUILD_DATE }}
          files: |
            ${{ env.FIRMWARE_PATH }}/*.img.gz
            ${{ env.FIRMWARE_PATH }}/*.manifest
          body: |
            ## 🚀 NanoPi R1S H5 专用固件
            - **源码:** ImmortalWrt 23.05
            - **默认 IP:** `${{ env.LAN_IP }}`
            - **用户名:** `root` / **密码:** `无` (或 password)
            - **优化:** 开启 BBR, 集成 USB 网口驱动, 包含自定义脚本。
            - **刷机建议:** 使用 balenaEtcher 写入 TF 卡。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
