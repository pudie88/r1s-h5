name: 'Build ImmortalWrt for NanoPi R1S H5'

on:
  push:
    branches: [ 'main' ]
  workflow_dispatch:
    inputs:
      custom_ip:
        description: '自定义 LAN IP'
        default: '192.168.10.1'

env:
  TZ: 'Asia/Shanghai'
  REPO_URL: 'https://github.com/immortalwrt/immortalwrt'
  REPO_BRANCH: 'openwrt-23.05'

jobs:
  build:
    runs-on: 'ubuntu-22.04'
    steps:
      - name: '检出代码'
        uses: actions/checkout@v4

      - name: '释放空间'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: '安装依赖'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget curl device-tree-compiler swig libelf-dev ccache ecj fastjar java-propose-classpath libncursesw5-dev texinfo xsltproc gperf pkg-config
          sudo timedatectl set-timezone "$TZ"

      - name: '克隆源码'
        run: |
          git clone --depth=1 -b "${{ env.REPO_BRANCH }}" "${{ env.REPO_URL }}" openwrt

      - name: '更新 Feeds'
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: '自定义配置'
        run: |
          cd openwrt

          # 设置目标设备为 NanoPi R1S H5
          cat >> .config <<'EOF'
          CONFIG_TARGET_sunxi=y
          CONFIG_TARGET_sunxi_cortexa53=y
          CONFIG_TARGET_sunxi_cortexa53_DEVICE_friendlyarm_nanopi-r1s-h5=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_tcpdump=y
          EOF

          # 设置 LAN IP
          LAN_IP="${{ github.event.inputs.custom_ip }}"
          [ -z "$LAN_IP" ] && LAN_IP="192.168.10.1"

          # 写入网络配置
          mkdir -p files/etc/config
          cat > files/etc/config/network <<'EOF'
          config interface 'loopback'
                  option device 'lo'
                  option proto 'static'
                  option ipaddr '127.0.0.1'
                  option netmask '255.0.0.0'

          config interface 'lan'
                  option device 'eth0'
                  option proto 'static'
                  option ipaddr '$LAN_IP'
                  option netmask '255.255.255.0'

          config interface 'wan'
                  option device 'eth1'
                  option proto 'dhcp'
          EOF

          make defconfig
          echo "BUILD_DATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: '下载源码包'
        run: |
          cd openwrt
          make download -j8

      - name: '编译固件'
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: '整理文件'
        run: |
          cd openwrt/bin/targets/sunxi/cortexa53
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

      - name: '上传固件'
        uses: actions/upload-artifact@v4
        with:
          name: 'ImmortalWrt_R1S_H5_${{ env.BUILD_DATE }}'
          path: '${{ env.FIRMWARE_PATH }}/*.img.gz'

      - name: '发布 Release'
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          tag_name: 'v${{ env.BUILD_DATE }}'
          name: 'R1S-H5 固件 ${{ env.BUILD_DATE }}'
          files: '${{ env.FIRMWARE_PATH }}/*.img.gz'
          body: |
            R1S-H5 专用固件
            默认 IP: ${{ github.event.inputs.custom_ip || '192.168.10.1' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
