name: Build ImmortalWrt R1S H5

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      custom_ip:
        description: "Custom LAN IP Address"
        required: false
        default: "192.168.10.1"

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-distutils rsync unzip zlib1g-dev file wget curl \
            device-tree-compiler swig libelf-dev ccache ecj fastjar \
            java-propose-classpath libncursesw5-dev python3-setuptools \
            texinfo util-linux xsltproc

      - name: Clone Source
        run: |
          git clone --depth=1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt
          echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

      - name: Update Feeds
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Config & Setup Files
        id: setup
        run: |
          cd $OPENWRT_PATH
          [ -f "$GITHUB_WORKSPACE/.config" ] && cp "$GITHUB_WORKSPACE/.config" .config
          [ -f "$GITHUB_WORKSPACE/feeds.conf.default" ] && cp "$GITHUB_WORKSPACE/feeds.conf.default" feeds.conf.default

          mkdir -p files/usr/local/bin
          cp -f "$GITHUB_WORKSPACE/scripts/"*.sh files/usr/local/bin/ 2>/dev/null || true
          chmod +x files/usr/local/bin/*.sh 2>/dev/null || true

          # 安全处理自定义 IP，避开 YAML 解析陷阱
          LAN_IP="${{ github.event.inputs.custom_ip || '192.168.10.1' }}"
          echo "LAN_IP=$LAN_IP" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

          mkdir -p files/etc/config
          cat > files/etc/config/network << 'NETEOF'
config interface 'loopback'
	option device 'lo'
	option proto 'static'
	option ipaddr '127.0.0.1'
	option netmask '255.0.0.0'

config globals 'globals'
	option ula_prefix 'auto'

config interface 'lan'
	option device 'eth0'
	option proto 'static'
	option ipaddr '192.168.10.1'
	option netmask '255.255.255.0'
	option ip6assign '60'

config interface 'wan'
	option device 'eth1'
	option proto 'dhcp'
NETEOF
          sed -i "s/192.168.10.1/$LAN_IP/g" files/etc/config/network
          sed -i "s/192.168.1.1/$LAN_IP/g" package/base-files/files/bin/config_generate
          sed -i "s/ImmortalWrt/R1S-H5/g" package/base-files/files/bin/config_generate

          mkdir -p files/etc/sysctl.d
          cat > files/etc/sysctl.d/99-optimize.conf << 'SYSEOF'
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr
net.ipv4.tcp_fastopen=3
net.ipv4.tcp_slow_start_after_idle=0
net.netfilter.nf_conntrack_max=65536
vm.swappiness=60
SYSEOF

          make defconfig

      - name: Cache Download
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      - name: Download Sources
        run: |
          cd $OPENWRT_PATH
          make download -j$(nproc)

      - name: Compile Firmware
        run: |
          cd $OPENWRT_PATH
          make -j$(nproc) || make -j1 V=s

      - name: Organize Output
        id: organize
        run: |
          cd $OPENWRT_PATH/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-R1S-H5
          path: ${{ steps.organize.outputs.FIRMWARE_PATH }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "R1S-H5-${{ env.BUILD_DATE }}"
          name: "ImmortalWrt R1S H5 - ${{ env.BUILD_DATE }}"
          files: "${{ steps.organize.outputs.FIRMWARE_PATH }}/*"
          body: |
            ## NanoPi R1S H5 Firmware

            **Default LAN IP:** `${{ env.LAN_IP }}`
            **Username:** `root`
            **Password:** `password`

            ### 已包含功能
            - LuCI 中文界面 + SSL
            - TCP BBR 拥塞控制
            - ZRAM 压缩交换
            - CAKE SQM 流量整形
            - 开机自动网络/内存优化脚本

            ### 刷写说明
            推荐使用 balenaEtcher 或 `dd` 命令。
            ⚠️ **注意接口方向**：
            - LAN 口 (eth0): 靠近电源接口
            - WAN 口 (eth1): 靠近 USB 接口

            首次启动若无法访问，请将电脑设为静态 IP `192.168.x.100/24` 后重试。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
