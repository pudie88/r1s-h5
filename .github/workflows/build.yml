name: Build ImmortalWrt R1S H5

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      custom_ip:
        description: "自定义LAN IP"
        required: false
        default: "192.168.10.1"

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: 释放磁盘空间
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: 安装编译依赖
      run: |
        sudo apt update
        sudo apt install -y \
        build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git \
        libncurses-dev libssl-dev python3 python3-distutils \
        rsync unzip zlib1g-dev file wget curl \
        device-tree-compiler swig libelf-dev

        sudo timedatectl set-timezone "$TZ"

    - name: 克隆源码
      run: |
        git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git openwrt
        echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

    - name: 更新 feeds
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 自定义配置
      run: |
        cd $OPENWRT_PATH

        LAN_IP="${{ github.event.inputs.custom_ip || '192.168.10.1' }}"
        echo "LAN_IP=$LAN_IP" >> $GITHUB_ENV

        sed -i "s/192.168.1.1/$LAN_IP/g" package/base-files/files/bin/config_generate
        sed -i 's/ImmortalWrt/R1S-H5/g' package/base-files/files/bin/config_generate

        mkdir -p files/etc/sysctl.d

        cat > files/etc/sysctl.d/99-openwrt.conf <<EOF
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr
net.ipv4.tcp_fastopen=3
net.ipv4.tcp_slow_start_after_idle=0
net.netfilter.nf_conntrack_max=65536
vm.swappiness=60
EOF

    - name: 生成默认配置
      run: |
        cd $OPENWRT_PATH

        cat > .config <<EOF
CONFIG_TARGET_sunxi=y
CONFIG_TARGET_sunxi_cortexa53=y
CONFIG_TARGET_sunxi_cortexa53_DEVICE_friendlyarm_nanopi-r1s-h5=y

CONFIG_TARGET_ROOTFS_PARTSIZE=512

CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-ssl-openssl=y
CONFIG_LUCI_LANG_zh_Hans=y

CONFIG_PACKAGE_zram-swap=y
CONFIG_PACKAGE_kmod-tcp-bbr=y

CONFIG_PACKAGE_htop=y
CONFIG_PACKAGE_nano=y
CONFIG_PACKAGE_curl=y
CONFIG_PACKAGE_wget-ssl=y
EOF

        make defconfig

    - name: 缓存下载包
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: immortalwrt-dl

    - name: 下载源码
      run: |
        cd $OPENWRT_PATH
        make download -j8

    - name: 编译固件
      run: |
        cd $OPENWRT_PATH
        make -j$(nproc) || make -j1

    - name: 整理固件
      id: organize
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        ls -lh

    - name: 上传 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: immortalwrt-r1s-h5
        path: ${{ env.FIRMWARE }}

    - name: 生成 Release
      id: tag
      run: |
        echo "tag=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

    - name: 发布 Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        files: ${{ env.FIRMWARE }}/*
        name: ImmortalWrt R1S H5
        body: |
          ### NanoPi R1S H5 固件

          默认IP: $LAN_IP
          用户名: root
          密码: password

          功能：
          - LuCI中文界面
          - TCP BBR
          - zRam
          - 系统优化

      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 删除旧 Release
      uses: dev-drprasad/delete-older-releases@v0.3.2
      with:
        keep_latest: 3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
